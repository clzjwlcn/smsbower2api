services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: smsbower2api-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smsbower2api}
      MYSQL_USER: ${MYSQL_USER:-smsbower}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smsbower_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smsbower_root_password}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - smsbower2api_mysql:/var/lib/mysql

  smsbower2api:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.1ms.run/library/node:22-bookworm-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: smsbower2api
    command: sh -c "node scripts/write-dev-vars.mjs && node scripts/init-db.mjs && npm run dev -- --hostname 0.0.0.0 --port 3000"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      PORT: 3000
      APP_ALLOWED_HOSTS: ${APP_ALLOWED_HOSTS:-true}
      CLOUDFLARE_CF_FETCH_ENABLED: "false"
      DATABASE_URL: ${DATABASE_URL:-mysql://smsbower:smsbower_password@mysql:3306/smsbower2api}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-asd123321}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      SMSBOWER_API_KEY: ${SMSBOWER_API_KEY:-}
      SMSBOWER_API_BASE_URL: ${SMSBOWER_API_BASE_URL:-https://smsbower.page/stubs/handler_api.php}
      SMSBOWER_WEBHOOK_SECRET: ${SMSBOWER_WEBHOOK_SECRET:-}
      SMSBOWER_WEBHOOK_ALLOWED_IPS: ${SMSBOWER_WEBHOOK_ALLOWED_IPS:-167.235.198.205}
    volumes:
      - smsbower2api_wrangler:/app/.wrangler

volumes:
  smsbower2api_mysql:
  smsbower2api_wrangler:
