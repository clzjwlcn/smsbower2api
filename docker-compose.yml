services:
  smsbower2api:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-docker.1ms.run/library/node:22-bookworm-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: smsbower2api
    command: sh -c "node scripts/write-dev-vars.mjs && npm run dev -- --hostname 0.0.0.0 --port 3000"
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      PORT: 3000
      APP_ALLOWED_HOSTS: ${APP_ALLOWED_HOSTS:-true}
      CLOUDFLARE_CF_FETCH_ENABLED: "false"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-asd123321}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      SMSBOWER_API_KEY: ${SMSBOWER_API_KEY:-}
      SMSBOWER_API_BASE_URL: ${SMSBOWER_API_BASE_URL:-https://smsbower.page/stubs/handler_api.php}
      SMSBOWER_WEBHOOK_SECRET: ${SMSBOWER_WEBHOOK_SECRET:-}
      SMSBOWER_WEBHOOK_ALLOWED_IPS: ${SMSBOWER_WEBHOOK_ALLOWED_IPS:-167.235.198.205}
    volumes:
      - smsbower2api_wrangler:/app/.wrangler

volumes:
  smsbower2api_wrangler:
